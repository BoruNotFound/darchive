<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./public/dawushiye-favicon.png?" />
    <title>大物是也 · 视频面板</title>
    <script>
      // SPA-redirect decoder. Pairs with public/404.html.
      // When GH Pages serves 404.html for a deep link like /darchive/admin/videos,
      // 404.html rewrites the URL to /darchive/?/admin/videos. This script
      // runs before React mounts and restores the original URL via history.replaceState
      // so React Router sees /admin/videos as it expects.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
